kind = "web"
previewPath = "/manager-view"
title = "Funnel IQ Analytics"
version = "1.0.0"
id = "artifacts/funnel-iq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/manager-view" ]
localPort = 22323

[services.development]
run = "pnpm --filter @workspace/funnel-iq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/funnel-iq", "run", "build" ]
publicDir = "artifacts/funnel-iq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22323"
BASE_PATH = "/manager-view"
