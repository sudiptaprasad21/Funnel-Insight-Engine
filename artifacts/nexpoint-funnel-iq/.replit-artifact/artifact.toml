kind = "web"
previewPath = "/"
title = "Happy Mom"
version = "1.0.0"
id = "artifacts/nexpoint-funnel-iq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23139

[services.development]
run = "pnpm --filter @workspace/nexpoint-funnel-iq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexpoint-funnel-iq", "run", "build" ]
publicDir = "artifacts/nexpoint-funnel-iq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23139"
BASE_PATH = "/"
